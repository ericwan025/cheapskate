# Local stack: Redis + orchestrator (+ the one-shot producer/interrupter tools).
# All app services share one image (built from ./Dockerfile) and differ only by
# the command + environment, so behaviour is entirely env-driven.
#
# Phase 2: the orchestrator OWNS the worker fleet. It launches/kills worker
# containers itself via the Docker socket based on queue depth — so `up` starts
# only redis + orchestrator, and there is no `--scale worker=N` any more.
#
#   docker compose up --build redis orchestrator dashboard             # run stack + UI at :8080
#   docker compose run --rm --no-deps -e JOB_COUNT=50 producer         # push 50 jobs
#   docker compose run --rm --no-deps -e INTERRUPT_COUNT=1 interrupter  # chaos
#   docker compose --profile manual up worker                          # 1 standalone worker (debug)
#
# NOTES on the one-shot tools:
#  - count goes via env var, not a positional arg: `docker compose run SERVICE
#    <token>` REPLACES the container command with <token>.
#  - always pass --no-deps: without it, `run` reconciles dependency services to
#    their configured scale (1).
#
# Workers discover each other's shared queue via Redis; the interrupter finds
# workers via the "worker" DNS name — orchestrator-launched containers carry
# that name as a network alias, so discovery works for them too.

x-app-image: &app-image
  build:
    context: .
    dockerfile: Dockerfile
  image: cheapskate:local

x-app-env: &app-env
  REDIS_URL: redis://redis:6379/0

services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10

  # Worker template. In Phase 2 the orchestrator launches workers itself, so this
  # is NOT auto-started (profile: manual) — it exists only as an image build
  # target and for running a single standalone worker while debugging.
  worker:
    <<: *app-image
    command: ["python", "-m", "cheapskate.worker"]
    environment:
      <<: *app-env
      JOB_MIN_SECONDS: ${JOB_MIN_SECONDS:-5.0}
      JOB_MAX_SECONDS: ${JOB_MAX_SECONDS:-30.0}
    depends_on:
      redis:
        condition: service_healthy
    profiles: ["manual"]

  # Long-running control loop. Phase 2: actuates the fleet — starts/stops worker
  # containers via the Docker socket to match queue depth. The socket mount is
  # what lets it talk to the daemon; job-duration knobs pass through so it can
  # forward them to the workers it launches.
  orchestrator:
    <<: *app-image
    command: ["python", "-m", "cheapskate.orchestrator"]
    environment:
      <<: *app-env
      JOB_MIN_SECONDS: ${JOB_MIN_SECONDS:-5.0}
      JOB_MAX_SECONDS: ${JOB_MAX_SECONDS:-30.0}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Read-only status dashboard (Phase 4). Shows queue depth, jobs completed, the
  # active worker fleet, and a live cost burn-rate — auto-refreshing in the
  # browser. Reads the docker socket to count the orchestrator's workers.
  # Open http://localhost:8080 after `up`.
  dashboard:
    <<: *app-image
    command: ["python", "-m", "cheapskate.dashboard"]
    environment:
      <<: *app-env
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # One-shot: pushes jobs then exits. Override count via env, e.g.
  # `docker compose run --rm -e JOB_COUNT=200 producer`. Not started by `up`.
  producer:
    <<: *app-image
    command: ["python", "-m", "cheapskate.job_producer"]
    environment:
      <<: *app-env
      JOB_COUNT: "50"
    depends_on:
      redis:
        condition: service_healthy
    restart: "no"
    profiles: ["tools"]

  # One-shot chaos tool: interrupt a random worker. Not started by `up`.
  # Deliberately NO depends_on: worker — `docker compose run` reconciles
  # dependencies to their configured scale (1), which would stop+remove the
  # extra replicas started with `--scale worker=N`, stranding their in-flight
  # jobs. Run it against an already-running fleet.
  interrupter:
    <<: *app-image
    command: ["python", "-m", "cheapskate.interrupter"]
    environment:
      <<: *app-env
      WORKER_SERVICE: worker
    restart: "no"
    profiles: ["tools"]
